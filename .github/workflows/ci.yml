name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run go vet
        run: go vet ./...

      # Official action handles caching and exact version pinning —
      # avoids the fragility of `go install golangci-lint@latest`.
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

      # Detect uncommitted go.mod / go.sum drift.
      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # go.mod requires Go 1.24 — testing on earlier versions is misleading.
        os: [ubuntu-latest]
        go-version: ["1.24", "stable"]
        include:
          # Also test on macOS and Windows with the latest stable Go.
          - os: macos-latest
            go-version: stable
          - os: windows-latest
            go-version: stable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Security ──────────────────────────────────────────────────────────────
  security:
    name: Security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build core module
        run: go build ./...

      - name: Build middleware/gin submodule
        run: go build ./...
        working-directory: middleware/gin

      - name: Build middleware/echo submodule
        run: go build ./...
        working-directory: middleware/echo

      - name: Build middleware/fiber submodule
        run: go build ./...
        working-directory: middleware/fiber

      - name: Build CLI
        run: go build -o /dev/null ./cmd/passcheck

      - name: Build examples
        run: go build -o /dev/null ./examples/...
